name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  frontend-ci:
    name: Frontend CI (Lint & Build Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Verify Production Build
        working-directory: frontend
        run: npm run build

  backend-ci:
    name: Backend CI (Unit Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: resume_pipeline/requirements.txt

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr libmagic1

      - name: Install PyTorch (CPU-only optimization)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python Dependencies
        working-directory: resume_pipeline
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Pytest Test Suite
        working-directory: resume_pipeline
        env:
          PYTHONPATH: .
          GEMINI_MOCK_MODE: "true"
          CI_SKIP_DB_VALIDATION: "true"
          SECRET_KEY: "test_secret_key_at_least_32_characters_long_for_signing_jwt"
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_api.py \
            --ignore=tests/test_interview.py \
            --ignore=tests/test_learning_path.py \
            --ignore=tests/test_recommendation_fallback.py \
            --ignore=tests/test_recommendation_system.py

  docker-build-push:
    name: Docker Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: resume_pipeline/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/career-guidance-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/career-guidance-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ec2-deploy:
    name: Deploy Backend to AWS EC2
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.EC2_DEPLOY_DIR }}
            echo "Reclaiming ownership of the deployment directory..."
            sudo chown -R $(whoami):$(whoami) . || true
            git config --global --add safe.directory '*' || true
            echo "Pulling latest changes from Git repository..."
            git fetch --all
            git checkout main
            git pull --ff-only
            
            echo "Cleaning up dangling and unused containers/networks/images before deployment..."
            sudo docker system prune -f
            
            echo "Pulling latest Docker image from Docker Hub..."
            sudo docker compose --env-file .env.aws -f deploy/docker/docker-compose.prod.yml pull
            
            echo "Recreating and restarting backend containers..."
            sudo docker compose --env-file .env.aws -f deploy/docker/docker-compose.prod.yml up -d --force-recreate
            
            echo "Cleaning up old/unused images after deployment..."
            sudo docker image prune -af
            
            echo "Waiting for services to spin up (15 seconds)..."
            sleep 15
            
            echo "Verifying running Docker containers:"
            sudo docker compose -f deploy/docker/docker-compose.prod.yml ps
            
            echo "Checking container health status:"
            sudo docker inspect --format='{{json .State.Health.Status}}' career-guidance-backend
            
            echo "Displaying backend logs tail:"
            sudo docker compose -f deploy/docker/docker-compose.prod.yml logs --tail 20 backend
            
            echo "Verifying database connection and data status:"
            sudo docker compose -f deploy/docker/docker-compose.prod.yml exec -T backend python scripts/verify_data.py

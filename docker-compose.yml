version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16
    container_name: career-guidance-db
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-root_password}
      POSTGRES_DB: ${PG_DB:-resumes}
      POSTGRES_USER: ${PG_USER:-app_user}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - career-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. Backend API Service (with in-process background worker threads)
  backend:
    build:
      context: ./resume_pipeline
      dockerfile: Dockerfile
    container_name: career-guidance-backend
    environment:
      PORT: 8000
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-app_user}
      PG_PASSWORD: ${PG_PASSWORD:-root_password}
      PG_DB: ${PG_DB:-resumes}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_SEARCH_API_KEY: ${GOOGLE_SEARCH_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      SECRET_KEY: ${SECRET_KEY}
      FILE_STORAGE_PATH: /app/data/raw_files
      GEMINI_MOCK_MODE: ${GEMINI_MOCK_MODE:-false}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "8000:8000"
    volumes:
      - ./data/raw_files:/app/data/raw_files
      - ./resume_pipeline/logs:/app/logs
    networks:
      - career-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/stats', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # 3. Frontend UI Static Nginx Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: career-guidance-frontend
    ports:
      - "80:80"
    networks:
      - career-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  db_data:

networks:
  career-network:
    driver: bridge
